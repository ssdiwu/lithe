name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to build (for example v0.1.1)"
        required: true
        type: string
      prerelease:
        description: "Mark the draft release as a prerelease"
        required: true
        default: true
        type: boolean

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Write Apple API key to disk
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$KEY_CONTENT" > "$HOME/private_keys/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: "Lithe ${{ inputs.tag }}"
          releaseBody: "See the assets to download and install. Lithe does not update from Terax releases."
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          args: ${{ matrix.args }}

      # Strip the bundled libwayland-* libs from the AppImage so it loads the
      # host copies at runtime. The Ubuntu 22.04 build host ships libwayland
      # 1.20, but recent Mesa (Fedora 43 / Arch / Bazzite, Mesa 1.22+) needs
      # newer symbols; AppImage puts its bundled libs first on the search path,
      # so the stale copy wins and EGL fails with EGL_BAD_PARAMETER. libgdk-3
      # hard-links these three, so removing them only redirects resolution to
      # the host copy, which every GTK-capable system has. They are on the
      # AppImage excludelist for this exact reason. The re-signed AppImage and
      # repacked AppImage is uploaded in place of the original asset.
      - name: Fix AppImage wayland libs
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          BASENAME=$(basename "$APPIMAGE")
          echo "Patching: $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/"
          pushd "$WORK" >/dev/null
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null

          # Fail loud if Tauri/linuxdeploy stops bundling these, so a future
          # layout change cannot silently ship an unfixed AppImage.
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test -e "squashfs-root/usr/lib/$lib" \
              || { echo "expected bundled lib missing: $lib (layout changed?)"; exit 1; }
          done

          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-server.so.0

          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run squashfs-root "$BASENAME"

          # Sanity-check the repacked image before it replaces the original.
          rm -rf squashfs-root
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test ! -e "squashfs-root/usr/lib/$lib" \
              || { echo "lib still present after repack: $lib"; exit 1; }
          done
          test -x squashfs-root/usr/bin/lithe \
            || { echo "lithe binary missing from repacked AppImage"; exit 1; }
          popd >/dev/null

          cp "$WORK/$BASENAME" "$APPIMAGE"

          TAG="${RELEASE_TAG}"
          gh release upload "$TAG" "$APPIMAGE" \
            --clobber --repo "$GITHUB_REPOSITORY"
